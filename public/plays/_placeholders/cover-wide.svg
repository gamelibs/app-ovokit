<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#faf7ef"/>

  <!-- Rough sketch border -->
  <rect x="40" y="40" width="1120" height="820" rx="14" ry="11"
    fill="none" stroke="#202020" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="10 4 4 4"/>

  <!-- Hand-drawn circle for face -->
  <ellipse cx="600" cy="380" rx="200" ry="210"
    fill="none" stroke="#202020" stroke-width="4" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="520" cy="330" rx="24" ry="32"
    fill="none" stroke="#202020" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="524" cy="326" r="5" fill="#202020"/>

  <!-- Right eye -->
  <ellipse cx="680" cy="330" rx="24" ry="32"
    fill="none" stroke="#202020" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="676" cy="326" r="5" fill="#202020"/>

  <!-- Smile -->
  <path d="M 500 430 Q 600 510 700 430"
    fill="none" stroke="#202020" stroke-width="4" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="470" cy="395" rx="30" ry="18"
    fill="#ff8b8b" opacity="0.35"/>
  <ellipse cx="730" cy="395" rx="30" ry="18"
    fill="#ff8b8b" opacity="0.35"/>

  <!-- Title area -->
  <text x="600" y="680" text-anchor="middle"
    font-family="'LXGW WenKai', 'Kalam', cursive, sans-serif"
    font-size="42" font-weight="700" fill="#202020">
    OVO
  </text>

  <text x="600" y="740" text-anchor="middle"
    font-family="'LXGW WenKai', 'Kalam', cursive, sans-serif"
    font-size="22" fill="#777">
    游戏玩法知识库
  </text>

  <!-- Decorative doodles -->
  <path d="M 140 160 Q 160 140 180 160 Q 160 180 140 160"
    fill="none" stroke="#ffda6a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 1000 200 Q 1020 180 1040 200 Q 1020 220 1000 200"
    fill="none" stroke="#7dcfff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 120 620 Q 140 600 160 620 Q 140 640 120 620"
    fill="none" stroke="#7dd87d" stroke-width="3" stroke-linecap="round"/>
  <path d="M 1040 580 Q 1060 560 1080 580 Q 1060 600 1040 580"
    fill="none" stroke="#ff8b8b" stroke-width="3" stroke-linecap="round"/>
</svg>
