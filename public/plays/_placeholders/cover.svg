<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <rect width="900" height="1200" fill="#faf7ef"/>

  <!-- Rough sketch border -->
  <rect x="40" y="40" width="820" height="1120" rx="12" ry="10"
    fill="none" stroke="#202020" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="8 4 3 4"/>

  <!-- Hand-drawn circle for face -->
  <ellipse cx="450" cy="520" rx="220" ry="230"
    fill="none" stroke="#202020" stroke-width="4" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="360" cy="460" rx="28" ry="38"
    fill="none" stroke="#202020" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="365" cy="455" r="6" fill="#202020"/>

  <!-- Right eye -->
  <ellipse cx="540" cy="460" rx="28" ry="38"
    fill="none" stroke="#202020" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="535" cy="455" r="6" fill="#202020"/>

  <!-- Smile -->
  <path d="M 340 580 Q 450 680 560 580"
    fill="none" stroke="#202020" stroke-width="4" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="300" cy="540" rx="35" ry="22"
    fill="#ff8b8b" opacity="0.35"/>
  <ellipse cx="600" cy="540" rx="35" ry="22"
    fill="#ff8b8b" opacity="0.35"/>

  <!-- Title area -->
  <text x="450" y="880" text-anchor="middle"
    font-family="'LXGW WenKai', 'Kalam', cursive, sans-serif"
    font-size="52" font-weight="700" fill="#202020">
    OVOKIT
  </text>

  <text x="450" y="960" text-anchor="middle"
    font-family="'LXGW WenKai', 'Kalam', cursive, sans-serif"
    font-size="28" fill="#777">
    游戏玩法知识库
  </text>

  <!-- Decorative doodles -->
  <path d="M 120 200 Q 140 180 160 200 Q 140 220 120 200"
    fill="none" stroke="#ffda6a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 740 280 Q 760 260 780 280 Q 760 300 740 280"
    fill="none" stroke="#7dcfff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 180 750 Q 200 730 220 750 Q 200 770 180 750"
    fill="none" stroke="#7dd87d" stroke-width="3" stroke-linecap="round"/>
  <path d="M 680 820 Q 700 800 720 820 Q 700 840 680 820"
    fill="none" stroke="#ff8b8b" stroke-width="3" stroke-linecap="round"/>

  <!-- Star sparkles -->
  <path d="M 160 350 L 165 365 L 180 370 L 165 375 L 160 390 L 155 375 L 140 370 L 155 365 Z"
    fill="#ffda6a" opacity="0.6"/>
  <path d="M 720 420 L 724 432 L 736 436 L 724 440 L 720 452 L 716 440 L 704 436 L 716 432 Z"
    fill="#7dcfff" opacity="0.5"/>
</svg>
