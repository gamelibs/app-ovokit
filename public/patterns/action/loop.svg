<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#202020"/>
    </marker>
  </defs>
  <rect width="800" height="300" fill="#faf7ef" rx="12"/>

  <!-- title -->
  <text x="400" y="36" text-anchor="middle" font-family="Kalam, cursive" font-size="18" font-weight="700" fill="#202020">动作反应：输入 → 反馈循环</text>

  <!-- nodes -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#fff" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">玩家输入</text>
  </g>
  <g transform="translate(190, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#fff" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">更新角色</text>
  </g>
  <g transform="translate(320, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#fff" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">物理更新</text>
  </g>
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#fff" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">碰撞检测</text>
  </g>
  <g transform="translate(580, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#fff" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">触发反馈</text>
  </g>
  <g transform="translate(710, 70)">
    <rect x="0" y="0" width="100" height="48" rx="8" fill="#ffda6a" stroke="#202020" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#202020">得分/失败</text>
  </g>

  <!-- arrows top row -->
  <path d="M160,94 Q175,94 190,94" fill="none" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M290,94 Q305,94 320,94" fill="none" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M420,94 Q435,94 450,94" fill="none" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M550,94 Q565,94 580,94" fill="none" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M680,94 Q695,94 710,94" fill="none" stroke="#202020" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- loop back -->
  <path d="M760,118 L760,200 Q760,220 730,220 L100,220 Q70,220 70,200 L70,118" fill="none" stroke="#202020" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="400" y="250" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">每帧重复，速度/密度随时间递增</text>

  <!-- detail cards -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="170" height="44" rx="8" fill="#fff" stroke="#202020" stroke-width="1.5"/>
    <text x="85" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">关键：输入窗口 &amp; 容错</text>
    <text x="85" y="36" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">延迟 &lt; 100ms 体验最佳</text>
  </g>
  <g transform="translate(300, 160)">
    <rect x="0" y="0" width="170" height="44" rx="8" fill="#fff" stroke="#202020" stroke-width="1.5"/>
    <text x="85" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">关键：碰撞盒设计</text>
    <text x="85" y="36" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">AABB / 圆形检测</text>
  </g>
  <g transform="translate(520, 160)">
    <rect x="0" y="0" width="170" height="44" rx="8" fill="#fff" stroke="#202020" stroke-width="1.5"/>
    <text x="85" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">关键：难度曲线</text>
    <text x="85" y="36" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">速度/密度逐步提升</text>
  </g>
</svg>
